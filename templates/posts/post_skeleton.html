{% load static %}
<div class="card mb-4 post-card shadow-sm">
  <div class="card-body p-3">
    <!-- Post Header Skeleton -->
    <div class="d-flex align-items-center justify-content-between mb-3">
      <div class="d-flex align-items-center">
        <div class="skeleton skeleton-avatar me-3"></div>
        <div class="flex-grow-1">
          <div
            class="skeleton skeleton-text"
            style="width: 120px; height: 1.2rem"
          ></div>
          <div
            class="skeleton skeleton-text"
            style="width: 80px; height: 0.8rem"
          ></div>
        </div>
      </div>
      <div
        class="skeleton"
        style="width: 20px; height: 20px; border-radius: 50%"
      ></div>
    </div>

    <!-- Post Content Skeleton -->
    <div class="mb-3">
      <div
        class="skeleton skeleton-text"
        style="width: 100%; height: 1rem"
      ></div>
      <div
        class="skeleton skeleton-text"
        style="width: 80%; height: 1rem"
      ></div>
      <div
        class="skeleton skeleton-text"
        style="width: 60%; height: 1rem"
      ></div>
    </div>

    <!-- Post Image Skeleton -->
    <div class="skeleton skeleton-image mb-3"></div>

    <!-- Hashtags Skeleton -->
    <div class="mb-3">
      <div
        class="skeleton"
        style="
          width: 60px;
          height: 24px;
          border-radius: 12px;
          display: inline-block;
          margin-right: 0.5rem;
        "
      ></div>
      <div
        class="skeleton"
        style="
          width: 80px;
          height: 24px;
          border-radius: 12px;
          display: inline-block;
        "
      ></div>
    </div>

    <!-- Post Actions Skeleton -->
    <div
      class="d-flex justify-content-between align-items-center border-top pt-3"
    >
      <div class="d-flex gap-2">
        <div
          class="skeleton"
          style="width: 60px; height: 32px; border-radius: 6px"
        ></div>
        <div
          class="skeleton"
          style="width: 60px; height: 32px; border-radius: 6px"
        ></div>
      </div>
      <div
        class="skeleton skeleton-text"
        style="width: 50px; height: 0.8rem"
      ></div>
    </div>
  </div>
</div>
