{% extends "base.html" %} {% load i18n %} {% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header text-center">
          <h3>{% translate "مراجعة التقرير" %}</h3>
        </div>
        <div class="card-body">
          <p><strong>{% translate "السبب" %}:</strong> {{ report.reason }}</p>
          <p>
            <strong>{% translate "الوصف" %}:</strong> {{ report.description }}
          </p>
          <p>
            <strong>{% translate "من" %}:</strong> {{ report.reporter.username
            }}
          </p>
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label for="action" class="form-label"
                >{% translate "الإجراء" %}</label
              >
              <select name="action" class="form-select" required>
                <option value="resolved">تم الحل</option>
                <option value="dismissed">تم رفضه</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary w-100">
              {% translate "حفظ" %}
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
